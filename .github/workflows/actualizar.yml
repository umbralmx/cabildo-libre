name: Actualizar datos y publicar

on:
  schedule:
    - cron: "0 14 * * 1,4" # lunes y jueves 8:00 Colima
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  actualizar:
    # En push solo se publica; el re-scrapeo corre programado o manual.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Re-scrapear el índice de actas
        run: python3 scraper/scrape_colima.py
      - name: Commitear datos si cambiaron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actas.json site/actas.json
          git diff --cached --quiet || git commit -m "datos: actualización automática $(date -u +%F)"
          git push

  publicar:
    needs: actualizar
    if: ${{ always() && needs.actualizar.result != 'failure' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
